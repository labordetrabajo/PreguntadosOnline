<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Preguntados Online – Silfab</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
.logo-icon {
  width: 80px;
  height: 80px;

  object-fit: contain;
  display: block;
  flex-shrink: 0;

  transition: width .3s, height .3s;
}

header.expanded .logo-icon {
  width: 120px;
  height: 120px;
}
    /* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;

  z-index: 9999;
  padding: 20px;
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: all;
}

.modal-box {
  width: 100%;
  max-width: 340px;

  background: #13357e;
  border: 1px solid rgba(255,255,255,0.12);

  border-radius: 20px;
  padding: 22px 18px;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 10px;
}

.modal-text {
  font-size: 14px;
  line-height: 1.5;
  color: rgba(255,255,255,0.75);
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}

.modal-btn {
  flex: 1;

  border: none;
  border-radius: 12px;

  padding: 14px;

  font-family: inherit;
  font-size: 14px;
  font-weight: 700;

  cursor: pointer;
}

.modal-btn.cancel {
  background: rgba(255,255,255,0.08);
  color: white;
}

.modal-btn.confirm {
  background: #c62828;
  color: white;
}

    .logout-btn {
  display: none;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.8);
  border-radius: 12px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .2s, opacity .2s;
  -webkit-appearance: none;
}

.logout-btn:active {
  opacity: .7;
}
    :root {
      --blue-dark:    #0D2B6E;
      --blue-mid:     #1565C0;
      --blue-light:   #1E88E5;
      --accent:       #7CB342;
      --white:        #FFFFFF;
      --white-80:     rgba(255,255,255,0.8);
      --white-15:     rgba(255,255,255,0.10);
      --white-border: rgba(255,255,255,0.16);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Barlow', Arial, sans-serif;
      background: var(--blue-dark);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ── FONDO ── */
    .bg-wave { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bg-wave::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 50%;
      background: var(--blue-mid);
      border-radius: 0 0 50% 50% / 0 0 30% 30%;
    }
    .bg-wave::after {
      content: '';
      position: absolute;
      top: 0; left: -15%; width: 130%; height: 44%;
      background: var(--blue-light);
      opacity: 0.28;
      border-radius: 0 0 45% 65% / 0 0 28% 40%;
    }

    /* ── PAGE ── */
    .page {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      margin: 0 auto;
      padding: 0 16px 80px;
    }

    /* ── HEADER compacto ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
      transition: padding .4s ease;
    }
    header.expanded { padding: 36px 0 24px; justify-content: center; flex-direction: column; }

    .logo-row { display: flex; align-items: center; gap: 8px; }
    .logo-icon {  height: 30px; flex-shrink: 0; transition: width .3s, height .3s; }
    header.expanded .logo-icon { height: 40px; }
    .logo-text { font-size: 17px; font-weight: 800; letter-spacing: 2px; transition: font-size .3s; }
    header.expanded .logo-text { font-size: 22px; }
    .logo-text span { color: var(--accent); }

    .header-titles { text-align: center; margin-top: 10px; }
    .app-title { font-size: 22px; font-weight: 700; }
    .app-sub { font-size: 13px; color: var(--white-80); font-weight: 300; margin-top: 3px; }

    /* ── PILL de usuario (post-login) ── */
    .user-pill {
      display: none;
      align-items: center; gap: 8px;
      background: rgba(124,179,66,0.18);
      border: 1.5px solid rgba(124,179,66,0.4);
      border-radius: 30px;
      padding: 6px 14px 6px 8px;
      font-size: 13px; font-weight: 600;
      color: var(--white);
      cursor: pointer;
      transition: background .2s;
      white-space: nowrap;
    }
    .user-pill:active { background: rgba(124,179,66,0.28); }
    .user-pill .pill-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: .5; transform: scale(1.4); }
    }

    /* ── CARD formulario ── */
    .card {
      background: var(--white-15);
      border: 1px solid var(--white-border);
      border-radius: 18px;
      padding: 20px 16px;
      margin-bottom: 16px;
    }
    .card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent);
      margin-bottom: 14px;
    }

    /* ── WRAP DEL FORMULARIO – colapsa con animación ── */
    #loginWrap {
      overflow: hidden;
      max-height: 400px;
      transition: max-height .45s cubic-bezier(.4,0,.2,1), opacity .35s ease, margin .35s ease;
      opacity: 1;
    }
    #loginWrap.collapsed {
      max-height: 0;
      opacity: 0;
      margin-bottom: 0;
      pointer-events: none;
    }

    /* ── INPUTS ── */
    .field { margin-bottom: 12px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--white-80); margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid var(--white-border);
      border-radius: 12px;
      color: var(--white);
      font-family: inherit; font-size: 16px; font-weight: 400;
      padding: 14px 16px;
      outline: none;
      transition: border-color .2s, background .2s;
      -webkit-appearance: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.3); }
    .field input:focus { border-color: var(--blue-light); background: rgba(255,255,255,0.13); }

    /* ── BOTONES ── */
    .btn-main {
      width: 100%; padding: 16px;
      background: var(--accent); color: var(--white);
      font-family: inherit; font-size: 15px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      border: none; border-radius: 14px; cursor: pointer;
      box-shadow: 0 6px 20px rgba(124,179,66,0.3);
      transition: opacity .15s, transform .1s;
      -webkit-appearance: none;
    }
    .btn-main:active { opacity: 0.8; transform: scale(0.98); }

    /* ── SECTION TITLE ── */
    .sec-title {
      font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--white-80);
      margin: 20px 0 10px 2px;
    }

    /* ── JUGADORES ── */
    #players { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    #players li {
      background: rgba(255,255,255,0.08);
      border-radius: 10px; padding: 11px 14px;
      font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 10px;
    }
    #players li::before { content: '●'; color: var(--accent); font-size: 7px; flex-shrink: 0; }

    /* ── LEADERBOARD ── */
    #leaderboard { list-style: none; display: flex; flex-direction: column; gap: 7px; }
    #leaderboard li {
      background: rgba(255,255,255,0.08);
      border-radius: 10px; padding: 11px 14px;
      font-size: 14px; font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
    }
    .lb-score { color: var(--accent); font-weight: 700; font-size: 13px; }
    .lb-time { color: rgba(255,255,255,.4); font-size: 11px; margin-left: 4px; }

    /* ── GAME ── */
    #gameStatus {
      text-align: center; font-size: 24px; font-weight: 700;
      color: #FFD54F; min-height: 32px; margin: 6px 0;
    }
    #timer {
      text-align: center; font-size: 64px; font-weight: 800;
      color: var(--accent); min-height: 72px; line-height: 1;
      transition: color .3s;
    }
    #timer.urgent { color: #FF5252; }
    #questionText {
      text-align: center; font-size: 18px; font-weight: 600;
      line-height: 1.4; margin: 14px 0 4px; min-height: 24px;
    }

    /* ── OPCIONES ── */
    #options { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    #options button {
      width: 100%;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid var(--white-border);
      border-radius: 14px;
      color: var(--white);
      font-family: inherit; font-size: 15px; font-weight: 500;
      padding: 16px 14px;
      cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 14px;
      line-height: 1.3;
      transition: background .12s, transform .08s;
      -webkit-appearance: none;
      min-height: 58px;
    }
    #options button:active:not(:disabled) { transform: scale(0.98); }
    #options button:disabled { opacity: 0.7; }
    .opt-letter {
      width: 34px; height: 34px; flex-shrink: 0;
      background: rgba(255,255,255,0.12);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center; font-size: 11px;
      color: rgba(255,255,255,0.22); padding: 20px 0 10px;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>
  <!-- MODAL SALIR -->
<div id="exitModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-title">Salir del evento</div>

    <div class="modal-text">
      ¿Querés abandonar esta partida e ingresar a otro evento?
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeExitModal()">
        Cancelar
      </button>

      <button class="modal-btn confirm" onclick="confirmExit()">
        Salir
      </button>
    </div>
  </div>
</div>
  <div class="bg-wave"></div>
  <div class="page">

    <!-- HEADER: expandido antes de login, compacto después -->
    <header class="expanded" id="mainHeader">
      <div class="logo-row">

  <img src="/logo.png" alt="Silfab" class="logo-icon">

  <!-- <div class="logo-text">SIL<span>FAB</span></div>-->

</div>
      <div class="header-titles">
        <div class="app-title">EXPERTOS EN SILFAB</div>
        <div class="app-sub">Ingresá al evento y competí</div>
      </div>
      <!-- Pill que aparece post-login -->
<div class="user-pill" id="userPill">
  <span class="pill-dot"></span>
  <span id="pillName"></span>
</div>

<button class="logout-btn" id="logoutBtn" onclick="reloadPage(event)">
  Salir
</button>
    </header>

    <!-- FORMULARIO DE ACCESO -->
    <div id="loginWrap">
      <div class="card">
        <div class="card-label">Acceso al evento</div>
        <div class="field">
          <label>Código del evento</label>
          <input type="text" id="roomCode" placeholder="Ej: SILFAB2026"
                 autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        </div>
        <div class="field" style="margin-bottom:16px">
          <label>Tu nombre</label>
          <input type="text" id="nickname" placeholder="Ej: Juan García"
                 autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
        <button class="btn-main" onclick="joinGame()">Entrar al juego</button>
      </div>
    </div>

    <!-- JUGADORES -->
<!-- JUGADORES -->
<div id="playersSection">
  <p class="sec-title">Jugadores conectados</p>
  <div class="card" style="padding:14px 16px;">
    <ul id="players"></ul>
  </div>
</div>

    <!-- LEADERBOARD -->
 <!--
<p class="sec-title">Leaderboard</p>
<div class="card" style="padding:14px 16px;">
  <ul id="leaderboard"></ul>
</div>
-->

    <!-- JUEGO -->
    <div class="card" style="margin-top:6px;">
      <div id="gameStatus"></div>
      <div id="timer"></div>
      <div id="questionText"></div>
      <div id="options"></div>
    </div>

    <div class="footer">Silfab · Preguntados Online</div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const LETTERS = ["A","B","C","D"];
    let countdown;
    let answered = false;
    const socket = io();

    /* ── LOGIN / COLAPSO ── */
    function joinGame() {
      const nickname = document.getElementById("nickname").value.trim();
      const roomCode = document.getElementById("roomCode").value.trim();
      if (!nickname) { alert("Ingresá un nombre"); return; }
      if (!roomCode) { alert("Ingresá el código del evento"); return; }
      socket.emit("joinGame", { nickname, roomCode });
    }

    function collapseLogin(nickname) {
    document.getElementById("logoutBtn").style.display = "block";
      // Colapsa el formulario
      document.getElementById("loginWrap").classList.add("collapsed");

      // Achica el header y muestra la pill con el nombre
      const header = document.getElementById("mainHeader");
      header.classList.remove("expanded");
      header.style.flexDirection = "row";
      header.style.justifyContent = "space-between";
      header.querySelector(".header-titles").style.display = "none";

      const pill = document.getElementById("userPill");
      document.getElementById("pillName").innerText = nickname;
      pill.style.display = "flex";

      // Scroll suave hacia arriba para que quede el juego visible
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

  function expandLogin() {
  document.getElementById("logoutBtn").style.display = "none";

  document.getElementById("loginWrap").classList.remove("collapsed");

  const header = document.getElementById("mainHeader");

  header.classList.add("expanded");
  header.style.flexDirection = "";
  header.style.justifyContent = "";

  header.querySelector(".header-titles").style.display = "";

  document.getElementById("userPill").style.display = "none";
}

function reloadPage(event) {
  event.stopPropagation();

  document
    .getElementById("exitModal")
    .classList.add("show");
}

function closeExitModal() {
  document
    .getElementById("exitModal")
    .classList.remove("show");
}

function confirmExit() {
  window.location.reload();
}

    /* ── SOCKET EVENTS ── */
    socket.on("playersUpdated", (players) => {
      const real = players.filter(p => !p.nickname.startsWith("SCREEN_"));
      const list = document.getElementById("players");
      list.innerHTML = "";
      real.forEach(p => {
        const li = document.createElement("li");
        li.innerText = p.nickname;
        list.appendChild(li);
      });

      // Si el servidor confirmó que entramos (tenemos jugadores), colapsamos
      const myNick = document.getElementById("nickname").value.trim();
      if (myNick && real.find(p => p.nickname === myNick)) {
        // Solo colapsar si todavía no está colapsado
        if (!document.getElementById("loginWrap").classList.contains("collapsed")) {
          collapseLogin(myNick);
        }
      }
    });

/*
socket.on("leaderboardUpdated", (players) => {
  const lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  players
    .filter(p => !p.nickname.startsWith("SCREEN_"))
    .slice(0, 4)
    .forEach(p => {

      const li = document.createElement("li");

      li.innerHTML = `
        <span>${p.nickname}</span>
        <span>
          <span class="lb-score">${p.score} pts</span>
          <span class="lb-time">(${p.totalResponseTime.toFixed(2)}s)</span>
        </span>
      `;

      lb.appendChild(li);
    });
});
*/
socket.on("gameEndedForce", () => {
  alert("La partida fue finalizada por el administrador");
  window.location.href = "/"; // o pantalla de lobby
});

    socket.on("invalidRoom", (msg) => alert(msg));

    socket.on("gameStarted", () => {
    document.getElementById("playersSection").style.display = "none";
      let c = 3;
      const st = document.getElementById("gameStatus");
      st.innerText = "Comienza en " + c;
      const iv = setInterval(() => {
        c--;
        if (c > 0) st.innerText = "Comienza en " + c;
        else { clearInterval(iv); st.innerText = ""; }
      }, 1000);
    });

    socket.on("showCorrectAnswer", (correct) => {
      document.querySelectorAll("#options button").forEach((btn, i) => {
        if (i + 1 == correct) btn.style.backgroundColor = "#2e7d32";
      });
    });

    socket.on("gameFinished", (players) => {
    document.getElementById("playersSection").style.display = "block";
      document.getElementById("questionText").innerText = "🏆 Partida finalizada";
      const timer = document.getElementById("timer");

timer.innerText = "";
timer.style.display = "none";
      const opt = document.getElementById("options");
      opt.innerHTML = "";
      const real = players.filter(p => !p.nickname.startsWith("SCREEN_"));
      if (real.length > 0) {
        const w = document.createElement("p");
        w.style.cssText = "text-align:center;font-size:20px;font-weight:700;color:#FFD54F;margin-top:14px;line-height:1.6;";
        w.innerHTML = "🥇 Ganador<br>" + real[0].nickname;
        opt.appendChild(w);
      }
    });

    socket.on("newQuestion", (question) => {

  const timerEl = document.getElementById("timer");
  timerEl.style.display = "block";

  answered = false;
  clearInterval(countdown);

 

      // Scroll automático al área de juego cuando llega una pregunta
      document.querySelector(".card:last-of-type")
        .scrollIntoView({ behavior: "smooth", block: "start" });

     
      let timeLeft = question.questionTime;
      timerEl.innerText = timeLeft;
      timerEl.classList.remove("urgent");

      countdown = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 3) timerEl.classList.add("urgent");
        if (timeLeft <= 0) clearInterval(countdown);
      }, 1000);

      document.getElementById("questionText").innerText = question.question;

      const opt = document.getElementById("options");
      opt.innerHTML = "";
      question.options.forEach((o, i) => {
        const btn = document.createElement("button");
        btn.innerHTML = `<span class="opt-letter">${LETTERS[i]}</span><span>${o}</span>`;
        btn.onclick = () => {
          if (answered) return;
          answered = true;
          document.querySelectorAll("#options button").forEach(b => b.disabled = true);
          btn.style.backgroundColor = (i + 1 == question.correct) ? "#2e7d32" : "#c62828";
          socket.emit("answerQuestion", {
            roomCode: document.getElementById("roomCode").value,
            answer: i + 1
          });
        };
        opt.appendChild(btn);
      });
    });
  </script>
</body>
</html>
